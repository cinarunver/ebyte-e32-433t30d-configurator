name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run tests
        run: pytest -q

  binary:
    name: Binaries (${{ matrix.os }})
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            suffix: linux-x86_64
            ext: ""
          - os: macos-latest
            suffix: macos
            ext: ""
          - os: windows-latest
            suffix: windows
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e .[build]
      - name: Build both binaries
        run: python scripts/build.py
      - name: Rename artifacts (unix)
        if: runner.os != 'Windows'
        run: |
          mv dist/e32config dist/e32config-${{ matrix.suffix }}
          mv dist/e32config-gui dist/e32config-gui-${{ matrix.suffix }}
      - name: Rename artifacts (windows)
        if: runner.os == 'Windows'
        run: |
          Rename-Item dist/e32config.exe e32config-${{ matrix.suffix }}.exe
          Rename-Item dist/e32config-gui.exe e32config-gui-${{ matrix.suffix }}.exe
      - uses: actions/upload-artifact@v4
        with:
          name: e32config-${{ matrix.suffix }}
          path: |
            dist/e32config-${{ matrix.suffix }}${{ matrix.ext }}
            dist/e32config-gui-${{ matrix.suffix }}${{ matrix.ext }}

  release:
    name: Attach binaries to release
    needs: binary
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
